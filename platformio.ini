; ============================================================================
;  CYD Guard - WiFi Deauth Detector + BLE Jam Detector
;  Board: Sunton ESP32-2432S024R (2.4" ILI9341 320x240, resistiver XPT2046-Touch)
;  Pinbelegung verifiziert gegen die offizielle Sunton-Boarddefinition
;  (github.com/rzeldent/platformio-espressif32-sunton/esp32-2432S024R.json)
; ============================================================================
[env:cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    h2zero/NimBLE-Arduino @ ^1.4.2

; ---- TFT_eSPI configuration via build flags (no need to edit library files) ----
; Touch (XPT2046) teilt sich den SPI-Bus mit dem Display (gleiche MOSI/MISO/SCLK),
; nur TOUCH_CS ist ein eigener Pin -> TFT_eSPI-eigene Touch-Unterstuetzung nutzen.
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
